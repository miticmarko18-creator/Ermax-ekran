<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERMAX Dashboard</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#050b16;
color:white;
position:relative;
}
body:before{
content:"";
position:absolute;inset:0;
background:
radial-gradient(circle at 25% 30%, rgba(0,120,255,.15), transparent 30%),
radial-gradient(circle at 80% 40%, rgba(255,120,0,.12), transparent 25%);
}
.frame{
position:absolute;inset:20px;
border:2px solid rgba(0,140,255,.45);
border-radius:24px;
}
.logo{
position:relative;
text-align:center;
font-size:56px;
font-weight:900;
letter-spacing:6px;
margin-top:0px;
color:#4eb5ff;
text-shadow:0 0 25px rgba(0,140,255,.8);
}
#clock{
position:relative;
text-align:center;
font-size:145px;
font-weight:900;
line-height:1;
margin-top:-10px;
text-shadow:0 0 30px rgba(0,140,255,.7);
}
#date{
position:relative;
text-align:center;
font-size:24px;
letter-spacing:4px;
color:#b8c7df;
margin-top:0px;
}
.cards{
position:relative;
display:flex;
justify-content:center;
gap:40px;
margin-top:4px;
}
.card{
width:600px;
height:220px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
backdrop-filter:none;
}
.blue{
border:2px solid #1188ff;
box-shadow:0 0 30px rgba(17,136,255,.3);
}
.orange{
border:2px solid #ff8610;
box-shadow:0 0 30px rgba(255,134,16,.3);
}
.label{
font-size:28px;
opacity:.9;
}
.value{
font-size:56px;
font-weight:900;
margin-top:10px;
}
#copyright{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:28px;
color:#d0d0d0;
}

#fullscreenBtn{
position:absolute;
top:10px;
right:95px;
width:32px;
height:32px;
padding:0;
border-radius:6px;
border:1px solid #1188ff;
background:#091321;
color:#4eb5ff;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px rgba(17,136,255,.3);
}

</style>
</head>
<body>
<div class="frame"></div>

<div class="logo">ERMAX</div>
<div id="clock">00:00:00</div>
<div id="date"></div>

<div class="cards">
<div class="card blue">
<div class="label">🏭 AKTUELNA SMENA</div>
<div class="value" id="shift">I SMENA</div>
</div>

<div class="card orange">
<div class="label">📅 KN NEDELJA</div>
<div class="value" id="week">KN 01</div>
</div>
</div>

<div id="copyright">© 2026 Marko Mitić</div><button id="fullscreenBtn" onclick="full()">⛶</button>

<script>
function weekNumber(d){
d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
var y=new Date(Date.UTC(d.getUTCFullYear(),0,1));
return Math.ceil((((d-y)/86400000)+1)/7);
}


function full(){

var doc=document.documentElement;

if(doc.requestFullscreen){doc.requestFullscreen();}
else if(doc.webkitRequestFullscreen){doc.webkitRequestFullscreen();}
else if(doc.webkitRequestFullScreen){doc.webkitRequestFullScreen();}
else if(doc.msRequestFullscreen){doc.msRequestFullscreen();}

}


function update(){
var n=new Date();
var h=String(n.getHours()).padStart(2,'0');
var m=String(n.getMinutes()).padStart(2,'0');
var s=String(n.getSeconds()).padStart(2,'0');

document.getElementById('clock').innerHTML=h+":"+m+":"+s;

var dani=["NEDELJA","PONEDELJAK","UTORAK","SREDA","ČETVRTAK","PETAK","SUBOTA"];
var meseci=["JANUAR","FEBRUAR","MART","APRIL","MAJ","JUN","JUL","AVGUST","SEPTEMBAR","OKTOBAR","NOVEMBAR","DECEMBAR"];

document.getElementById('date').innerHTML=
dani[n.getDay()]+" | "+n.getDate()+". "+meseci[n.getMonth()]+" "+n.getFullYear()+".";

var smena="III SMENA";
if(n.getHours()>=6 && n.getHours()<14)smena="I SMENA";
else if(n.getHours()>=14 && n.getHours()<22)smena="II SMENA";

document.getElementById('shift').innerHTML=smena;
document.getElementById('week').innerHTML="KN "+weekNumber(n);
}

window.onload=function(){update();}
setInterval(update,1000);
</script>
</body>
</html>
