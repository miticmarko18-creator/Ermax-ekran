<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERMAX Premium</title>
<style>
body{
margin:0;
background:#f3f7fc;
font-family:Arial,sans-serif;
overflow:hidden;
color:#173b63;
}
#header{
height:10px;
background:#2f6db5;
}
.logo{
text-align:center;
font-size:54px;
font-weight:bold;
letter-spacing:8px;
padding:15px 0 5px 0;
}
#clock{
text-align:center;
font-size:145px;
font-weight:bold;
line-height:1;
}
#date{
text-align:center;
font-size:34px;
font-weight:bold;
margin-top:8px;
}
.row{
display:flex;
gap:20px;
width:92%;
margin:20px auto;
}
.card{
flex:1;
background:white;
border-radius:22px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
text-align:center;
}
.label{
font-size:22px;
color:#6c7a89;
}
.value{
font-size:58px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>
<body>

<div id="header"></div>

<div class="logo">ERMAX</div>

<div id="clock">00:00:00</div>

<div id="date"></div>

<div class="row">
<div class="card">
<div class="label">AKTUELNA SMENA</div>
<div class="value" id="shift">I SMENA</div>
</div>

<div class="card">
<div class="label">KN NEDELJA</div>
<div class="value" id="week">KN 01</div>
</div>
</div>

<script>
function getWeek(d){
var date=new Date(d.getTime());
date.setDate(date.getDate()+4-(date.getDay()||7));
var yearStart=new Date(date.getFullYear(),0,1);
return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function update(){
var n=new Date();

var dani=["NEDELJA","PONEDELJAK","UTORAK","SREDA","ČETVRTAK","PETAK","SUBOTA"];
var meseci=["JANUAR","FEBRUAR","MART","APRIL","MAJ","JUN","JUL","AVGUST","SEPTEMBAR","OKTOBAR","NOVEMBAR","DECEMBAR"];

var h=n.getHours();
var m=n.getMinutes();
var s=n.getSeconds();

if(h<10) h="0"+h;
if(m<10) m="0"+m;
if(s<10) s="0"+s;

document.getElementById("clock").innerHTML=h+":"+m+":"+s;

document.getElementById("date").innerHTML=
dani[n.getDay()]+" | "+n.getDate()+". "+meseci[n.getMonth()]+" "+n.getFullYear()+".";

var smena="";
var boja="";

if(n.getHours()>=6 && n.getHours()<14){
smena="I SMENA";
boja="#2f6db5";
}
else if(n.getHours()>=14 && n.getHours()<22){
smena="II SMENA";
boja="#16a34a";
}
else{
smena="III SMENA";
boja="#7c3aed";
}

document.getElementById("shift").innerHTML=smena;
document.getElementById("week").innerHTML="KN "+getWeek(n);
document.getElementById("header").style.background=boja;
}

update();
setInterval(update,1000);
</script>

</body>
</html>
