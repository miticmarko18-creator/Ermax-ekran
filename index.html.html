
<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERMAX TV</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#050b16;
color:#fff;
height:100vh;
}
body:before{
content:"";
position:fixed;
left:0;top:0;right:0;bottom:0;
background:
radial-gradient(circle at 20% 25%, rgba(0,120,255,.12), transparent 30%),
radial-gradient(circle at 80% 25%, rgba(255,120,0,.10), transparent 28%);
}
.frame{
position:absolute;
left:6px;right:6px;top:6px;bottom:6px;
border:2px solid rgba(0,140,255,.35);
border-radius:18px;
}
.logo{
position:relative;
text-align:center;
font-size:80px;
font-weight:bold;
letter-spacing:6px;
margin-top:25px;
color:#4eb5ff;
}
#clock{
position:relative;
text-align:center;
font-size:200px;
font-weight:bold;
line-height:1;
margin-top:10px;
text-shadow:0 0 18px rgba(0,140,255,.5);
}
#date{
position:relative;
text-align:center;
font-size:38px;
margin-top:10px;
color:#c9d4e8;
}
.cards{
position:relative;
display:flex;
justify-content:center;
gap:35px;
margin-top:35px;
}
.card{
width:550px;
height:190px;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.blue{border:2px solid #1188ff;}
.orange{border:2px solid #ff8610;}
.label{font-size:24px;}
.value{
font-size:80px;
font-weight:bold;
margin-top:6px;
}
#copyright{
position:relative;
text-align:center;
margin-top:20px;
font-size:16px;
opacity:.7;
}
</style>
</head>
<body>
<div class="frame"></div>

<div class="logo">ERMAX</div>
<div id="clock">00:00:00</div>
<div id="date"></div>

<div class="cards">
<div class="card blue">
<div class="label">🏭 AKTUELNA SMENA</div>
<div class="value" id="shift">I SMENA</div>
</div>

<div class="card orange">
<div class="label">📅 KN NEDELJA</div>
<div class="value" id="week">KN 01</div>
</div>
</div>

<div id="copyright">© 2026 Marko Mitić</div>

<script>
function weekNumber(d){
var date=new Date(d.getTime());
date.setDate(date.getDate()+4-(date.getDay()||7));
var yearStart=new Date(date.getFullYear(),0,1);
return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function update(){
var n=new Date();
var h=n.getHours(), m=n.getMinutes(), s=n.getSeconds();
if(h<10) h="0"+h;
if(m<10) m="0"+m;
if(s<10) s="0"+s;

document.getElementById("clock").innerHTML=h+":"+m+":"+s;

var dani=["NEDELJA","PONEDELJAK","UTORAK","SREDA","ČETVRTAK","PETAK","SUBOTA"];
var meseci=["JANUAR","FEBRUAR","MART","APRIL","MAJ","JUN","JUL","AVGUST","SEPTEMBAR","OKTOBAR","NOVEMBAR","DECEMBAR"];

document.getElementById("date").innerHTML=
dani[n.getDay()]+" | "+n.getDate()+". "+meseci[n.getMonth()]+" "+n.getFullYear()+".";

var smena="III SMENA";
if(n.getHours()>=6 && n.getHours()<14) smena="I SMENA";
else if(n.getHours()>=14 && n.getHours()<22) smena="II SMENA";

document.getElementById("shift").innerHTML=smena;
document.getElementById("week").innerHTML="KN "+weekNumber(n);
}

window.onload=function(){
update();
setInterval(update,1000);
};
</script>
</body>
</html>
